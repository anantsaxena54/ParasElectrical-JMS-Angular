<div class="tech-dashboard-container container">
  <div class="header-section">
    <h2>My Tasks</h2>
    <p class="text-muted">Mobile-optimized view for technicians</p>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    Loading your jobs...
  </div>

  <div *ngIf="!loading" class="mobile-job-list">
    
    <div class="job-card glass-card animate-fade-in" *ngFor="let job of myJobs">
      <div class="job-card-header">
        <h3 class="job-id">{{job.jobId}}</h3>
        <span class="stage-badge">{{job.currentStage}}</span>
      </div>
      
      <div class="job-card-body">
        <div class="info-row">
          <span class="label">Motor:</span>
          <span class="value">{{job.capacity}} kW {{job.motorType}}</span>
        </div>
        <div class="info-row">
          <span class="label">Priority:</span>
          <span class="value priority-badge" [ngClass]="job.priority.toLowerCase()">{{job.priority}}</span>
        </div>
        <div class="info-row problem-text">
          <span class="label">Issue:</span>
          <span class="value">{{job.problemReported || 'Not specified'}}</span>
        </div>
      </div>
      
      <div class="job-card-actions">
        <a [routerLink]="['/jobs', job.id]" class="btn btn-primary btn-block">Update Progress</a>
      </div>
    </div>
    
    <div *ngIf="myJobs.length === 0" class="text-center py-5 text-muted glass-card">
      <p>No active jobs assigned to you right now.</p>
    </div>

  </div>
</div>
